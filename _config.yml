title:            Nathan Englehart
description:      Welcome to my personal site.
# Your site's domain goes here. Leave localhost server or blank when working locally.
url:              //nathanenglehart.github.io
#http://localhost:4000
#https://nathanenglehart.github.io
disqus_shortname: nathanenglehart

# Links to include in top navigation
# For external links add external: true
links:
  - title: CV
    url: /files/cv.pdf
  - title: Background
    url: /background/
  - title: Projects
    url: /projects/
  - title: Research
    url: /research/
  
  

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    American/New_York
future:      true
#pygments:    true
highlighter: rouge
markdown:    kramdown
kramdown:
  extensions: ["strikethrough"]
  
# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:categories/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: mathjax
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

syntax_highlighter_opts:
  line_numbers:
  line_numbers_start: 1
  tab_width: 4
  bold_every: 10
  css: class

include: [".htaccess"]
exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules", "Gemfile", "Gemfile.lock", "LICENSE", "README.md"]
